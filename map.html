<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Map</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Cormorant+Garamond:wght@600;700&family=Bodoni+Moda:ital,opsz,wght@0,6..96,700;0,6..96,900;1,6..96,400&family=Cinzel:wght@700;900&family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@400;700&family=Caveat:wght@500;600;700&family=Patrick+Hand&family=Cabin+Sketch:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Lato', sans-serif;
    background: #1c1008
      repeating-linear-gradient(45deg, transparent 0 8px, rgba(255,255,255,0.02) 8px 9px);
    color: var(--ink, #222);
    min-height: 100vh;
    padding: 24px;
  }

  .sheet {
    max-width: 1500px;
    margin: 0 auto;
    background: var(--parch, #f5f0e8);
    background-image:
      radial-gradient(ellipse at top left, rgba(0,0,0,0.06), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(0,0,0,0.06), transparent 60%);
    border: 6px solid var(--frame, #444);
    box-shadow:
      inset 0 0 0 8px var(--parch, #f5f0e8),
      inset 0 0 0 11px var(--inner-border, #bbb),
      inset 0 0 0 13px var(--frame, #444),
      0 24px 80px rgba(0,0,0,.6);
    padding: 18px;
    position: relative;
  }

  .cartouche {
    text-align: center;
    padding: 18px 0 14px;
    border-bottom: 1.5px solid var(--inner-border, #bbb);
    margin-bottom: 14px;
    position: relative;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.04), transparent 70%);
  }
  .deco {
    color: var(--accent, #800);
    font-size: 22px;
    margin: 0 18px;
    vertical-align: middle;
  }
  .cartouche h1 {
    display: inline-block;
    font-family: 'Yeseva One', serif;
    font-weight: 400;
    font-size: 48px;
    color: var(--ink, #222);
    letter-spacing: 4px;
    line-height: 1;
    vertical-align: middle;
  }
  .cartouche .sub {
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    color: var(--frame, #444);
    letter-spacing: 6px;
    margin-top: 8px;
  }
  .cartouche .free-badge {
    position: absolute; top: 18px; left: 18px;
    background: var(--accent, #800); color: var(--parch, #f5f0e8);
    border: 2px solid var(--parch, #f5f0e8); border-radius: 50%;
    width: 64px; height: 64px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Cabin Sketch', cursive; font-weight: 700;
    box-shadow: 0 3px 10px rgba(0,0,0,.4);
    transform: rotate(-8deg);
  }
  .cartouche .free-badge .free { font-size: 18px; line-height: 1; }
  .cartouche .free-badge .take { font-size: 8px; letter-spacing: 1px; margin-top: 3px; opacity: 0.85; }
  .back-link {
    position: absolute; top: 18px; right: 18px;
    font-family: 'Cabin Sketch', cursive; font-weight: 700;
    font-size: 13px; letter-spacing: 2px;
    background: var(--frame, #444); color: var(--parch, #f5f0e8);
    border: 2px solid var(--inner-border, #bbb);
    padding: 6px 14px; border-radius: 4px;
    text-decoration: none;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
  }
  .back-link:hover { opacity: 0.85; }

  .map-frame {
    border: 3px solid var(--frame, #444);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    background: #ccc;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.15);
  }
  #map { height: 720px; width: 100%; }

  .leaflet-tile-pane {
    filter: var(--tile-filter, none);
    mix-blend-mode: var(--tile-blend, normal);
    opacity: var(--tile-opa, 1);
  }
  .map-frame::after {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.12) 100%),
      repeating-radial-gradient(circle at 25% 30%, rgba(0,0,0,0.02) 0, rgba(0,0,0,0.02) 1px, transparent 2px, transparent 5px);
    pointer-events: none;
    z-index: 401;
  }

  .bottom-bar {
    margin-top: 14px;
    background: linear-gradient(to bottom, var(--parch, #f5f0e8), var(--parch-dark, #ddd));
    border: 2px solid var(--frame, #444);
    border-radius: 5px;
    padding: 14px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .legend { display: flex; gap: 18px; flex-wrap: wrap; }
  .legend-item {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Caveat', cursive; font-size: 18px; font-weight: 700;
    color: var(--ink, #222);
  }
  .legend-dot { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--ink, #222); }
  .credit { font-family: 'Patrick Hand', cursive; font-size: 12px; color: var(--frame, #444); letter-spacing: 1px; }

  .biz-marker {
    width: 28px; height: 36px;
    background: var(--cat-color, #444);
    border: 2px solid rgba(255,255,255,0.85);
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    box-shadow: 0 2px 6px rgba(0,0,0,.35);
    cursor: pointer;
    transition: transform 0.15s ease;
    display: flex; align-items: center; justify-content: center;
  }
  .biz-marker:hover { transform: rotate(-45deg) scale(1.2); z-index: 1000; }
  .biz-marker .num {
    transform: rotate(45deg);
    font-family: 'Cabin Sketch', cursive; font-weight: 700; font-size: 11px; color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,.4);
  }

  .leaflet-popup-content-wrapper {
    background: linear-gradient(to bottom, var(--parch, #f5f0e8), var(--parch-dark, #ddd));
    border: 2px solid var(--frame, #444);
    border-radius: 6px;
    box-shadow: 0 6px 18px rgba(0,0,0,.4);
    padding: 0;
  }
  .leaflet-popup-tip { background: var(--parch-dark, #ddd); }
  .popup {
    padding: 12px 14px; min-width: 220px;
    font-family: 'Lato', sans-serif; color: var(--ink, #222);
  }
  .popup img { width: 100%; border-radius: 4px; border: 1.5px solid var(--frame, #444); margin-bottom: 8px; }
  .popup h3 { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 4px; color: var(--cat-color, var(--ink, #222)); }
  .popup .cat {
    display: inline-block;
    background: var(--cat-color, #444); color: var(--parch, #f5f0e8);
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 2px 8px; border-radius: 10px; margin-bottom: 6px;
    font-family: 'Patrick Hand', cursive;
  }
  .popup .desc { font-size: 14px; line-height: 1.4; }
  .popup .meta {
    margin-top: 6px; font-size: 12px; color: var(--frame, #444);
    border-top: 1px dashed var(--inner-border, #bbb); padding-top: 6px;
  }
  .popup .dirs {
    margin-top: 10px; padding-top: 8px;
    border-top: 1px dashed var(--inner-border, #bbb);
    display: flex; gap: 6px;
  }
  .popup .dirs a {
    flex: 1; display: inline-block;
    background: var(--cat-color, #444); color: #fff;
    font-family: 'Cabin Sketch', cursive; font-weight: 700;
    font-size: 11px; letter-spacing: 1px;
    text-align: center; text-decoration: none;
    padding: 6px 4px; border-radius: 3px; border: 1.5px solid var(--frame, #444);
    transition: filter 0.15s;
  }
  .popup .dirs a:hover { filter: brightness(1.15); }
  .popup .dirs a.apple  { background: #2A2A2A; }
  .popup .dirs a.google { background: #4285F4; }

  .compass-corner {
    position: absolute; bottom: 20px; right: 24px;
    z-index: 500; width: 90px; height: 90px;
    pointer-events: none; opacity: 0.92;
  }

  .leaflet-control-attribution { font-size: 10px; opacity: 0.6; }
  .leaflet-div-icon { background: none !important; border: none !important; }

  /* ── SPIN & EXPLORE ── */
  .spin-bar {
    margin-top: 12px;
    background: linear-gradient(to bottom, var(--parch, #f5f0e8), var(--parch-dark, #ddd));
    border: 2px solid var(--frame, #444);
    border-radius: 8px;
    padding: 14px 20px;
  }
  .spin-title {
    font-family: 'Yeseva One', serif;
    font-size: 18px; color: var(--accent, #800);
    text-align: center; margin-bottom: 10px;
    letter-spacing: 2px;
  }
  .spin-cats {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 12px;
  }
  .spin-cat-btn {
    font-family: 'Lato', sans-serif; font-weight: 700; font-size: 13px;
    color: #fff; border: none; border-radius: 20px;
    padding: 7px 16px; cursor: pointer;
    transition: transform 0.15s, filter 0.15s;
    box-shadow: 0 2px 6px rgba(0,0,0,.2);
  }
  .spin-cat-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
  .spin-cat-btn.active { outline: 3px solid var(--ink, #222); outline-offset: 2px; }

  .spin-result {
    display: none;
    background: var(--parch, #f5f0e8);
    border: 2px solid var(--inner-border, #bbb);
    border-radius: 8px;
    padding: 14px 18px;
    text-align: center;
    position: relative;
    overflow: hidden;
    animation: spin-reveal 0.4s ease;
  }
  @keyframes spin-reveal {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .spin-result.spinning .spin-place-name {
    animation: spin-names 0.08s steps(1) infinite;
  }
  @keyframes spin-names {
    0%   { opacity: 0.4; }
    50%  { opacity: 1; }
    100% { opacity: 0.4; }
  }
  .spin-result-label {
    font-family: 'Lato', sans-serif; font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--frame, #444); margin-bottom: 4px;
  }
  .spin-place-name {
    font-family: 'Yeseva One', serif; font-size: 24px;
    color: var(--spin-color, var(--accent, #800));
    margin-bottom: 4px; line-height: 1.2;
  }
  .spin-place-short {
    font-family: 'Lato', sans-serif; font-size: 13px;
    color: var(--frame, #444); margin-bottom: 10px;
  }
  .spin-again-btn {
    font-family: 'Cabin Sketch', cursive; font-weight: 700; font-size: 13px;
    letter-spacing: 1px; background: var(--spin-color, var(--accent, #800));
    color: #fff; border: none; border-radius: 20px;
    padding: 7px 20px; cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,.2);
    transition: filter 0.15s;
  }
  .spin-again-btn:hover { filter: brightness(1.15); }

  @keyframes pin-pulse {
    0%   { transform: rotate(-45deg) scale(1); }
    30%  { transform: rotate(-45deg) scale(1.5); }
    60%  { transform: rotate(-45deg) scale(1.1); }
    100% { transform: rotate(-45deg) scale(1); }
  }
  .biz-marker.pulsing { animation: pin-pulse 0.6s ease 3; }

  /* ── NEAR ME ── */
  #near-me-btn {
    font-family: 'Cabin Sketch', cursive; font-weight: 700; font-size: 13px;
    letter-spacing: 1px;
    background: var(--frame, #444); color: var(--parch, #f5f0e8);
    border: none; border-radius: 20px; padding: 7px 16px; cursor: pointer;
    transition: background 0.15s, transform 0.15s;
    box-shadow: 0 2px 6px rgba(0,0,0,.2);
    white-space: nowrap;
  }
  #near-me-btn:hover { background: var(--accent, #800); transform: scale(1.04); }
  #near-me-btn.active { background: #2A6848; }
  #near-me-btn:disabled { opacity: 0.6; cursor: default; transform: none; }

  .you-are-here {
    width: 18px; height: 18px;
    background: #4285F4;
    border: 3px solid #fff;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(66,133,244,0.5);
    animation: you-pulse 2s ease-out infinite;
  }
  @keyframes you-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(66,133,244,0.5); }
    70%  { box-shadow: 0 0 0 14px rgba(66,133,244,0); }
    100% { box-shadow: 0 0 0 0 rgba(66,133,244,0); }
  }
  .popup-dist {
    font-family: 'Lato', sans-serif; font-size: 12px;
    color: #2A6848; font-weight: 700;
    margin-bottom: 5px; letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<script>
/* Validate and resolve region from URL, then load its data file synchronously */
const regionId = (() => {
  const p = new URLSearchParams(location.search).get('region') || 'rock-hill';
  return /^[a-z0-9-]+$/.test(p) ? p : 'rock-hill';
})();
document.write('<script src="regions/' + regionId + '.js"><\/script>');
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(function () {
  const R = window.REGION;
  if (!R) { document.body.innerHTML = '<p style="color:red;padding:2rem">Region data failed to load.</p>'; return; }

  /* Apply palette as CSS custom properties */
  const root = document.documentElement;
  Object.entries(R.palette).forEach(([k, v]) => root.style.setProperty(k, v));

  /* Update page title */
  document.title = R.name + ' — Map';

  /* Build HTML shell */
  document.body.innerHTML = `
    <div class="sheet">
      <header class="cartouche">
        <a class="back-link" href="index.html">← All Maps</a>
        <span class="deco">✦</span><h1>${R.name}</h1><span class="deco">✦</span>
        <div class="sub">${R.sub}</div>
      </header>
      <div class="map-frame">
        <div id="map"></div>
        <img class="compass-corner" src="assets/compass.png" alt="compass" onerror="this.style.display='none'">
      </div>
      <div class="bottom-bar">
        <div class="legend" id="legend"></div>
        <button id="near-me-btn">📍 Near Me</button>
        <div class="credit">${R.interactiveCredit}</div>
      </div>
      <div class="spin-bar">
        <div class="spin-title">✦ Spin &amp; Explore ✦</div>
        <div class="spin-cats" id="spin-cats"></div>
        <div class="spin-result" id="spin-result">
          <div class="spin-result-label">Your next adventure</div>
          <div class="spin-place-name" id="spin-name"></div>
          <div class="spin-place-short" id="spin-short"></div>
          <button class="spin-again-btn" id="spin-again">🎲 Spin Again</button>
        </div>
      </div>
    </div>`;

  /* Legend */
  const legendEl = document.getElementById('legend');
  R.legend.forEach(({ color, label }) => {
    legendEl.insertAdjacentHTML('beforeend',
      `<div class="legend-item"><span class="legend-dot" style="background:${color}"></span>${label}</div>`);
  });

  /* Map */
  const map = L.map('map', {
    zoomControl: true, attributionControl: true,
    minZoom: 12, maxZoom: 18,
  }).setView(R.center, R.zoom);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap contributors © CARTO · Map ✦ ' + R.credit,
  }).addTo(map);

  /* Markers */
  const markerMap = {}; // keyed by place n
  R.places.forEach(pl => {
    const col = R.cats[pl.cat] || '#444';
    const html = `<div class="biz-marker" style="--cat-color:${col};border-color:${col}"><div class="num" style="--cat-color:${col}">${pl.n}</div></div>`;
    const icon = L.divIcon({ html, className: '', iconSize: [28, 36], iconAnchor: [14, 36] });

    const appleUrl  = `https://maps.apple.com/?daddr=${pl.lat},${pl.lon}&dirflg=w&q=${encodeURIComponent(pl.name)}`;
    const googleUrl = `https://www.google.com/maps/dir/?api=1&destination=${pl.lat},${pl.lon}&travelmode=walking`;

    const popupHtml = `
      <div class="popup" style="--cat-color:${col}">
        ${pl.img ? `<img src="${pl.img}" alt="${pl.name}">` : ''}
        <div class="cat" style="background:${col}">${pl.cat}</div>
        <h3>${pl.name}</h3>
        <div class="popup-dist" id="dist-${pl.n}"></div>
        <div class="desc">${pl.desc}</div>
        <div class="meta">${pl.meta}</div>
        <div class="dirs">
          <a class="apple"  href="${appleUrl}"  target="_blank" rel="noopener">🍎 Apple Maps</a>
          <a class="google" href="${googleUrl}" target="_blank" rel="noopener">🗺 Google Maps</a>
        </div>
      </div>`;

    const marker = L.marker([pl.lat, pl.lon], { icon })
      .addTo(map)
      .bindPopup(popupHtml, { maxWidth: 280, closeButton: true });

    markerMap[pl.n] = { marker, pl, col };
  });

  /* ── NEAR ME ── */
  let userLatLng = null;
  let userMarker = null;

  function haversineKm(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
              Math.sin(dLon/2)**2;
    return R * 2 * Math.asin(Math.sqrt(a));
  }

  function formatDist(km) {
    const mi = km * 0.621371;
    return mi < 0.1
      ? Math.round(mi * 5280) + ' ft away'
      : mi.toFixed(1) + ' mi away';
  }

  document.getElementById('near-me-btn').addEventListener('click', () => {
    if (!navigator.geolocation) { alert('Geolocation not supported on this device.'); return; }
    const btn = document.getElementById('near-me-btn');
    btn.textContent = '📍 Locating…';
    btn.disabled = true;

    navigator.geolocation.getCurrentPosition(pos => {
      userLatLng = [pos.coords.latitude, pos.coords.longitude];

      // Remove old marker
      if (userMarker) map.removeLayer(userMarker);

      // Add pulsing "you are here" dot
      const youIcon = L.divIcon({
        html: '<div class="you-are-here"></div>',
        className: '', iconSize: [18, 18], iconAnchor: [9, 9]
      });
      userMarker = L.marker(userLatLng, { icon: youIcon, zIndexOffset: 2000 })
        .addTo(map)
        .bindTooltip('You are here', { permanent: false, className: 'biz-tip' });

      // Fly to user location
      map.flyTo(userLatLng, 15, { duration: 1.5 });

      // Update button state
      btn.textContent = '📍 Near Me ✓';
      btn.classList.add('active');
      btn.disabled = false;

      // Sort places by distance and populate dist elements on popup open
      const sorted = Object.values(markerMap)
        .map(({ marker, pl, col }) => ({
          marker, pl, col,
          km: haversineKm(userLatLng[0], userLatLng[1], pl.lat, pl.lon)
        }))
        .sort((a, b) => a.km - b.km);

      sorted.forEach(({ marker, pl, km }) => {
        marker.on('popupopen', () => {
          const el = document.getElementById('dist-' + pl.n);
          if (el) el.textContent = '📍 ' + formatDist(km);
        });
      });

      // Open nearest place after flying
      setTimeout(() => sorted[0].marker.openPopup(), 1700);

    }, () => {
      btn.textContent = '📍 Near Me';
      btn.disabled = false;
      alert('Could not get your location. Please allow location access and try again.');
    }, { timeout: 10000 });
  });

  /* ── SPIN & EXPLORE ── */
  const spinCatsEl   = document.getElementById('spin-cats');
  const spinResult   = document.getElementById('spin-result');
  const spinNameEl   = document.getElementById('spin-name');
  const spinShortEl  = document.getElementById('spin-short');
  const spinAgainBtn = document.getElementById('spin-again');

  // Build category emoji map from legend labels
  const catEmoji = { outdoor:'🥾', food:'🍽', coffee:'☕', arts:'🎨', family:'🎳' };

  let activeCat = null;

  // Build category buttons
  Object.entries(R.cats).forEach(([cat, color]) => {
    const places = R.places.filter(p => p.cat === cat);
    if (!places.length) return;
    const emoji = catEmoji[cat] || '📍';
    const label = R.legend.find(l => l.color === color)?.label || cat;
    const btn = document.createElement('button');
    btn.className = 'spin-cat-btn';
    btn.style.background = color;
    btn.innerHTML = emoji + ' ' + label.replace('&amp;', '&');
    btn.dataset.cat = cat;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.spin-cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCat = cat;
      doSpin(cat);
    });
    spinCatsEl.appendChild(btn);
  });

  function doSpin(cat) {
    const places = R.places.filter(p => p.cat === cat);
    if (!places.length) return;

    spinResult.style.display = 'block';
    spinResult.classList.add('spinning');

    // Cycle through names quickly
    let count = 0;
    const total = 18;
    const interval = setInterval(() => {
      const random = places[Math.floor(Math.random() * places.length)];
      spinNameEl.textContent = random.name;
      count++;
      if (count >= total) {
        clearInterval(interval);
        // Pick final winner
        const winner = places[Math.floor(Math.random() * places.length)];
        spinResult.classList.remove('spinning');
        spinResult.style.setProperty('--spin-color', R.cats[cat]);
        spinNameEl.textContent = winner.name;
        spinShortEl.textContent = winner.short || winner.desc.slice(0, 60) + '…';

        // Fly map to winner
        map.flyTo([winner.lat, winner.lon], 16, { duration: 1.2 });

        // Pulse the marker
        const m = markerMap[winner.n];
        if (m) {
          setTimeout(() => {
            const el = m.marker.getElement();
            if (el) {
              const pin = el.querySelector('.biz-marker');
              if (pin) {
                pin.classList.remove('pulsing');
                void pin.offsetWidth; // reflow
                pin.classList.add('pulsing');
              }
            }
            m.marker.openPopup();
          }, 1300);
        }
      }
    }, 80);
  }

  spinAgainBtn.addEventListener('click', () => {
    if (activeCat) doSpin(activeCat);
  });

})();
</script>
</body>
