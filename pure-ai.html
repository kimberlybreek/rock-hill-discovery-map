<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rock Hill — Pure AI Watercolor (v1)</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Patrick+Hand&family=Cabin+Sketch:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Patrick Hand', cursive;
    background: #2A1810
      repeating-linear-gradient(45deg, transparent 0 8px, rgba(255,255,255,0.02) 8px 9px);
    min-height: 100vh;
    padding: 24px;
    display: flex;
    justify-content: center;
  }
  .sheet {
    max-width: 1500px;
    width: 100%;
    background: #F0E2B8;
    border: 6px solid #5A3818;
    box-shadow:
      inset 0 0 0 8px #F0E2B8,
      inset 0 0 0 11px #C8A878,
      inset 0 0 0 13px #5A3818,
      0 24px 80px rgba(0,0,0,.6);
    padding: 18px;
    position: relative;
  }
  .cartouche {
    text-align: center;
    padding: 18px 0 14px;
    border-bottom: 1.5px solid #8A6840;
    margin-bottom: 14px;
    position: relative;
  }
  .cartouche::before, .cartouche::after {
    content: '✦'; color: #A02018; font-size: 22px;
    margin: 0 18px; vertical-align: middle;
  }
  .cartouche h1 {
    display: inline-block;
    font-family: 'Cabin Sketch', cursive;
    font-weight: 700;
    font-size: 48px;
    color: #3A2208;
    letter-spacing: 4px;
    line-height: 1;
    vertical-align: middle;
  }
  .cartouche .sub {
    font-family: 'Patrick Hand', cursive;
    font-size: 14px;
    color: #5A3818;
    letter-spacing: 6px;
    margin-top: 8px;
  }
  .map-frame {
    border: 3px solid #5A3818;
    border-radius: 4px;
    overflow: hidden;
    background: #DDC890;
  }
  .map-frame img {
    display: block; width: 100%; height: auto;
  }
  .note {
    margin-top: 14px;
    background: linear-gradient(to bottom, #F0E2B8, #D6BD8A);
    border: 2px solid #5A3818;
    border-radius: 5px;
    padding: 14px 22px;
    font-family: 'Patrick Hand', cursive;
    color: #3A2208;
    text-align: center;
    font-size: 16px;
  }
  .note .label { font-family: 'Caveat', cursive; font-weight: 700; font-size: 22px; color: #A02018; display: block; margin-bottom: 4px; }
  .nav { text-align: center; margin-top: 18px; }
  .nav a { font-family: 'Cabin Sketch', cursive; font-weight: 700; font-size: 14px;
    color: #F0E2B8; background: #5A3818; padding: 8px 18px; border-radius: 4px;
    text-decoration: none; letter-spacing: 2px; }
</style>
</head>
<body>
<div class="sheet">
  <header class="cartouche">
    <h1>Downtown Rock Hill</h1>
    <div class="sub">· YORK COUNTY · SOUTH CAROLINA · v1 — PURE AI ·</div>
  </header>
  <div class="map-frame">
    <img src="pure-ai-art.jpg" alt="AI-generated watercolor map of Rock Hill">
  </div>
  <div class="note">
    <span class="label">Generated end-to-end by image AI</span>
    Beautiful watercolor artwork, but the AI doesn't know Rock Hill's real streets or businesses. Generic fantasy village, not navigable.
  </div>
  <div class="nav"><a href="index.html">← Back to gallery</a></div>
</div>
</body>
</html>
