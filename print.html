<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Map — Print Edition</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cinzel:wght@700;900&family=Cormorant:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;700&family=Cabin+Sketch:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #111; }
  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--ink, #222);
    background:
      repeating-linear-gradient(45deg, transparent 0 8px, rgba(255,255,255,0.02) 8px 9px),
      #111;
    min-height: 100vh;
    padding: 24px;
    display: flex; justify-content: center; align-items: flex-start;
  }

  /* ── SHEET ── */
  .sheet {
    width: 2000px; flex-shrink: 0;
    padding: 10px;
    background: var(--parch, #f5f0e8);
    border: 6px solid var(--frame, #444);
    box-shadow:
      inset 0 0 0 8px var(--parch, #f5f0e8),
      inset 0 0 0 11px var(--inner-border, #bbb),
      inset 0 0 0 13px var(--frame, #444),
      0 24px 80px rgba(0,0,0,.6);
    padding: 14px;
    position: relative;
  }

  /* ── CARTOUCHE ── */
  .cartouche {
    text-align: center; padding: 6px 0 5px;
    border-bottom: 1.5px solid var(--inner-border, #bbb);
    margin-bottom: 16px; position: relative;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.04), transparent 70%);
  }
  .title-row { display: flex; align-items: center; justify-content: center; }
  .cartouche .deco { color: var(--accent, #800); font-size: 22px; margin: 0 16px; }
  .cartouche h1 {
    display: inline-block;
    font-family: 'Cormorant Garamond', serif; font-weight: 700;
    font-size: 42px; color: var(--ink, #222);
    letter-spacing: 6px; line-height: 1; vertical-align: middle;
  }
  .cartouche .sub {
    font-family: 'DM Sans', sans-serif; font-size: 10px;
    color: var(--frame, #444); letter-spacing: 5px; margin-top: 3px;
  }
  .cartouche .free-badge {
    position: absolute; top: 12px; left: 12px;
    background: var(--accent, #800); color: var(--parch, #f5f0e8);
    border: 2px solid var(--parch, #f5f0e8); border-radius: 50%;
    width: 60px; height: 60px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Cabin Sketch', cursive; font-weight: 700;
    box-shadow: 0 3px 8px rgba(0,0,0,.4); transform: rotate(-8deg);
  }
  .cartouche .free-badge .free { font-size: 16px; line-height: 1; }
  .cartouche .free-badge .take { font-size: 7px; letter-spacing: 1px; margin-top: 2px; opacity: 0.85; }
  .cartouche .edition {
    position: absolute; top: 18px; right: 18px;
    border: 1.5px solid var(--navy, #444); color: var(--navy, #444);
    font-family: 'Cabin Sketch', cursive; font-weight: 700;
    font-size: 10px; letter-spacing: 2px;
    padding: 3px 10px; border-radius: 14px; background: var(--parch, #f5f0e8);
  }

  /* ── BODY GRID ── */
  .body { display: grid; grid-template-columns: 220px 1fr 220px; gap: 10px; align-items: stretch; }

  /* ── HORIZONTAL RAILS (top / bottom of map) ── */
  .h-rail { display: flex; flex-wrap: nowrap; gap: 4px; margin: 4px 0; align-items: stretch; height: 130px; }
  .h-rail .h-rail-head {
    writing-mode: vertical-lr; transform: rotate(180deg);
    background: var(--navy, #444); color: var(--parch, #f5f0e8);
    font-family: 'Cinzel', serif; font-weight: 700;
    font-size: 9px; letter-spacing: 1px;
    text-align: center; padding: 6px 4px; border-radius: 3px;
    white-space: nowrap; flex-shrink: 0; align-self: stretch;
  }
  .h-rail .h-rail-head.eat    { background: var(--accent, #800); }
  .h-rail .h-rail-head.do     { background: var(--green, #484); }
  .h-rail .h-rail-head.coffee { background: var(--cat-coffee, #4a2a08); }
  .h-rail .h-rail-head.fam    { background: var(--cat-fam, #380a38); }
  .h-rail .ad { flex: 1; min-width: 0; height: auto; align-self: stretch; }

  /* ── SIDE RAILS ── */
  .rail { display: flex; flex-direction: column; gap: 8px; }
  .rail-head {
    background: var(--navy, #444); color: var(--parch, #f5f0e8);
    font-family: 'Cinzel', serif; font-weight: 700;
    font-size: 11px; letter-spacing: 2px;
    text-align: center; padding: 6px 8px; border-radius: 3px;
  }
  .rail-head.eat    { background: var(--accent, #800); }
  .rail-head.do     { background: var(--green, #484); }
  .rail-head.coffee { background: var(--cat-coffee, #4a2a08); }
  .rail-head.fam    { background: var(--cat-fam, #380a38); }

  .ad {
    background: color-mix(in srgb, var(--parch, #f5f0e8) 60%, white);
    border: 1.5px solid var(--inner-border, #bbb);
    border-radius: 3px; padding: 8px 10px; position: relative;
    overflow: hidden; text-align: center;
    height: 120px;
  }
  .ad.has-img {
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  .ad.logo-only {
    background-size: contain;
    background-position: center;
  }
  .ad.text-strip {
    background-size: cover;
    background-position: center calc(50% - 21px);
    padding: 0;
  }
  .ad.text-strip.fit-contain {
    background-size: 90%;
    background-position: center calc(50% - 21px);
    background-repeat: no-repeat;
  }
  .ad.text-strip .text-area {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: white;
    padding: 5px 8px;
    border-top: 1px solid var(--inner-border, #bbb);
  }
  .ad.text-strip .text-area h3 { font-size: 13px; margin-bottom: 1px; }
  .ad.text-strip .text-area .sub { font-size: 10px; margin-bottom: 1px; }
  .ad.text-strip .ad-num { z-index: 2; }
  .ad.has-img::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.12);
    border-radius: 3px;
  }
  .ad.has-img > * { position: relative; z-index: 1; }
  .ad-num {
    position: absolute; top: 4px; left: 4px;
    width: 22px; height: 22px;
    background: var(--cat-color, var(--frame, #444));
    color: var(--parch, #f5f0e8);
    border: 1.5px solid var(--parch, #f5f0e8); border-radius: 50%;
    font-family: 'Cabin Sketch', cursive; font-weight: 700; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 3px rgba(0,0,0,.3);
  }
  .ad-img { display: none; }
  .ad h3 {
    font-family: 'Cormorant Garamond', serif; font-weight: 700;
    font-size: 17px; color: var(--ink, #222);
    line-height: 1.05; margin-bottom: 2px; margin-left: 0;
  }
  .ad .sub  { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--frame, #444); line-height: 1.3; margin-bottom: 3px; }
  .ad .meta { font-family: 'DM Sans', sans-serif; font-size: 9px; color: var(--frame, #555); line-height: 1.2; padding-top: 3px; }

  /* ── MAP COLUMN ── */
  .map-col { display: flex; flex-direction: column; gap: 8px; }
  .map-below { display: flex; flex-direction: column; }
  .map-below .h-rail { margin: 0; height: 130px; }
  .map-below .h-rail .ad { height: auto; align-self: stretch; }

  /* ── MAP AREA ── */
  .map-area {
    border: 3px solid var(--frame, #444); border-radius: 3px;
    overflow: hidden; background: var(--parch, #f5f0e8); position: relative;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.15);
  }
  #map { height: 520px; width: 100%; }
  .leaflet-control-container, .leaflet-control-zoom { display: none !important; }
  .leaflet-control-attribution { font-size: 8px; opacity: 0.4; }
  .leaflet-div-icon { background: none !important; border: none !important; }
  .leaflet-tile-pane {
    filter: var(--tile-filter, none);
    mix-blend-mode: var(--tile-blend, normal);
    opacity: var(--tile-opa, 1);
  }
  .map-area::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.15) 100%);
    pointer-events: none; z-index: 401;
  }
  .compass-corner {
    position: absolute; bottom: 14px; right: 16px;
    z-index: 500; width: 84px; height: 84px; pointer-events: none; opacity: 0.92;
  }

  /* ── INFO PANEL (right column) ── */
  .info-panel {
    display: flex; flex-direction: column; gap: 10px;
    height: 100%;
  }
  .info-block {
    background: color-mix(in srgb, var(--parch, #f5f0e8) 70%, white);
    border: 1.5px solid var(--inner-border, #bbb);
    border-radius: 5px; padding: 12px 10px; text-align: center;
  }
  .info-block.accent-block {
    background: var(--frame, #444); color: var(--parch, #f5f0e8);
  }
  .info-block-head {
    font-family: 'Cinzel', serif; font-weight: 700;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--accent, #800); margin-bottom: 8px;
  }
  .info-block.accent-block .info-block-head { color: var(--parch, #f5f0e8); opacity: 0.7; }
  .info-qr-img {
    width: 120px; height: 120px; display: block; margin: 0 auto 8px;
    border: 2px solid var(--frame, #444); border-radius: 4px;
    background: white; padding: 3px;
  }
  .info-qr-cta {
    font-family: 'Cabin Sketch', cursive; font-weight: 700;
    font-size: 14px; color: var(--accent, #800); letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .info-qr-sub {
    font-family: 'Lato', sans-serif; font-size: 10px;
    color: var(--frame, #444); line-height: 1.4;
  }
  .info-legend { display: flex; flex-direction: column; gap: 6px; text-align: left; }
  .info-legend .item {
    display: flex; align-items: center; gap: 7px;
    font-family: 'Lato', sans-serif; font-weight: 700; font-size: 11px;
    color: var(--ink, #222);
  }
  .info-legend .dot {
    width: 14px; height: 14px; flex-shrink: 0;
    border-radius: 3px; border: 1.5px solid rgba(0,0,0,0.2);
  }
  .info-tip {
    font-family: 'Patrick Hand', cursive; font-size: 12px;
    line-height: 1.5; color: var(--frame, #444); text-align: left;
  }
  .info-tip strong { font-family: 'Cabin Sketch', cursive; color: var(--accent, #800); font-size: 13px; }
  .info-credit {
    font-family: 'Lato', sans-serif; font-size: 10px;
    color: var(--parch, #f5f0e8); opacity: 0.8; line-height: 1.5;
    letter-spacing: 0.5px;
  }
  .info-credit strong { font-family: 'Cabin Sketch', cursive; font-size: 13px; opacity: 1; }

  /* ── MARKERS ── */
  .biz-marker {
    background: transparent; border: none;
    border-radius: 50%; width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: none;
  }
  .biz-marker .num {
    font-family: 'Cabin Sketch', cursive; font-weight: 700; font-size: 10px; color: #fff;
    background: var(--cat-color, var(--frame, #444));
    width: 100%; height: 100%; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    text-shadow: 0 1px 2px rgba(0,0,0,.35);
  }
  .leaflet-tooltip.biz-tip {
    background: color-mix(in srgb, var(--parch, #f5f0e8) 96%, transparent);
    border: 1.5px solid var(--frame, #444); border-radius: 3px;
    box-shadow: 0 2px 6px rgba(0,0,0,.25); padding: 3px 7px;
    font-family: 'Caveat', cursive; font-weight: 700; font-size: 16px;
    color: var(--ink, #222); white-space: nowrap;
  }
  .leaflet-tooltip.biz-tip::before { border-right-color: var(--frame, #444); }

  /* ── BOTTOM STRIP ── */
  .bottom-strip {
    margin-top: 8px;
    background: linear-gradient(to bottom, var(--parch, #f5f0e8), var(--parch-dark, #ddd));
    border: 2px solid var(--frame, #444); border-radius: 4px;
    padding: 10px 16px;
    display: flex; gap: 18px; align-items: center; justify-content: space-between;
  }
  .credit { font-family: 'Patrick Hand', cursive; font-size: 12px; color: var(--frame, #444); letter-spacing: 1px; }

  /* footer info items */
  .footer-qr { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .footer-qr img { width: 64px; height: 64px; border: 1.5px solid var(--frame,#444); border-radius: 4px; background: white; padding: 2px; }
  .footer-qr-text { font-family: 'Patrick Hand', cursive; line-height: 1.4; }
  .footer-qr-title { font-family: 'Cabin Sketch', cursive; font-weight: 700; font-size: 14px; color: var(--accent, #800); }
  .footer-qr-sub { font-size: 11px; color: var(--frame, #444); max-width: 160px; }

  .footer-legend { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .footer-legend .item { display: inline-flex; align-items: center; gap: 5px; font-family: 'Lato', sans-serif; font-weight: 700; font-size: 11px; color: var(--ink, #222); }
  .footer-legend .dot { width: 13px; height: 13px; border-radius: 3px; border: 1.5px solid rgba(0,0,0,0.2); flex-shrink: 0; }

  .footer-tip { font-family: 'Patrick Hand', cursive; font-size: 12px; color: var(--frame, #444); line-height: 1.5; border-left: 1.5px dashed var(--inner-border,#bbb); padding-left: 14px; }
  .footer-tip strong { font-family: 'Cabin Sketch', cursive; color: var(--accent, #800); font-size: 13px; }

  .footer-credit { font-family: 'Patrick Hand', cursive; font-size: 11px; color: var(--frame, #444); letter-spacing: 1px; text-align: right; border-left: 1.5px dashed var(--inner-border,#bbb); padding-left: 14px; flex-shrink: 0; }

  /* ── PRINT BAR ── */
  .print-bar { position: fixed; top: 12px; right: 12px; z-index: 9999; display: flex; gap: 8px; }
  .print-bar button, .print-bar a {
    font-family: 'Cabin Sketch', cursive; font-weight: 700; font-size: 13px; letter-spacing: 2px;
    background: var(--accent, #800); color: var(--parch, #f5f0e8);
    border: 2px solid var(--parch, #f5f0e8);
    padding: 8px 14px; border-radius: 4px; cursor: pointer; text-decoration: none;
    box-shadow: 0 3px 10px rgba(0,0,0,.4);
  }
  .print-bar a { background: var(--frame, #444); }
  .print-bar button:hover { opacity: 0.88; }

  @page { size: 19in 13in landscape; margin: 0.25in; }
  @media print {
    html, body { background: #fff !important; padding: 0 !important; margin: 0 !important; display: block !important; }
    .sheet { box-shadow: none; border-width: 4px; width: 100%; max-width: none; page-break-inside: avoid; }
    .print-bar { display: none !important; }
    .h-rail { flex-wrap: nowrap !important; align-items: stretch !important; margin: 2px 0 !important; }
    .h-rail .ad { min-height: 70px !important; }
    #map { height: 480px !important; }
    .body { align-items: stretch !important; }
    .map-col { display: flex !important; flex-direction: column !important; }
    .map-below { flex: 1 !important; display: flex !important; flex-direction: column !important; }
    .map-below .h-rail { flex: 1 !important; height: auto !important; }
  }
</style>
</head>
<body>
<script>
/* Resolve region + optional theme from URL */
const regionId = (() => {
  const p = new URLSearchParams(location.search).get('region') || 'rock-hill';
  return /^[a-z0-9-]+$/.test(p) ? p : 'rock-hill';
})();
const themeId = new URLSearchParams(location.search).get('theme') || null;
document.write('<script src="regions/' + regionId + '.js"><\/script>');
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(function () {
  const R = window.REGION;
  if (!R) { document.body.innerHTML = '<p style="color:red;padding:2rem">Region data failed to load.</p>'; return; }

  /* Apply palette — merge theme override if present */
  const palette = Object.assign({}, R.palette, (themeId && R.themes && R.themes[themeId]) || {});
  /* Derive cat-color CSS vars for rail heads from cats object */
  if (R.cats) {
    palette['--cat-coffee'] = R.cats.coffee || palette['--cat-coffee'] || '#4a2a08';
    palette['--cat-fam']    = R.cats.family  || palette['--cat-fam']   || '#380a38';
  }
  const root = document.documentElement;
  Object.entries(palette).forEach(([k, v]) => root.style.setProperty(k, v));

  document.title = R.name + ' — Print Edition';

  /* Build a lookup map by number for quick rail rendering */
  const byNum = {};
  R.places.forEach(p => { byNum[p.n] = p; });

  /* Render a single rail section */
  function renderSection({ head, cls, nums }) {
    const ads = nums.map(n => {
      const pl = byNum[n];
      if (!pl) return '';
      const col = R.cats[pl.cat] || 'var(--frame)';
      const imgStyle = pl.img ? `background-image:url('${pl.img}');` : '';
      const bgColorStyle = pl.bgColor ? `background-color:${pl.bgColor};` : '';
      const useStrip = pl.img && !pl.logoOnly;
      return `<div class="ad${pl.img ? (useStrip ? ' text-strip' : ' logo-only') : ''}${pl.logoOnly ? ' logo-only' : ''}${pl.fitContain ? ' fit-contain' : ''}" style="--cat-color:${col};${bgColorStyle}${imgStyle}">
        <span class="ad-num">${pl.n}</span>
        ${pl.logoOnly
          ? `<div class="meta" style="position:absolute;bottom:6px;left:8px;right:8px;">${pl.meta || ''}</div>`
          : useStrip
            ? `<div class="text-area"><h3>${pl.name}</h3><div class="sub">${pl.short || ''}</div><div class="meta">${pl.meta || ''}</div></div>`
            : `<h3>${pl.name}</h3><div class="sub">${pl.short || ''}</div><div class="meta">${pl.meta || ''}</div>`}
      </div>`;
    }).join('');
    return `<div class="rail-head ${cls}">${head}</div>${ads}`;
  }

  /* Render a horizontal strip of sections */
  function renderHRail(sections) {
    if (!sections || !sections.length) return '';
    const inner = sections.map(({ head, cls, nums, lightText }) => {
      const ads = nums.map(n => {
        const pl = byNum[n];
        if (!pl) return '';
        const col = R.cats[pl.cat] || 'var(--frame)';
        const imgStyle = pl.img ? `background-image:url('${pl.img}');` : '';
        const bgColorStyle = pl.bgColor ? `background-color:${pl.bgColor};` : '';
        const useStrip = pl.img && !pl.logoOnly;
        return `<div class="ad${pl.img ? (useStrip ? ' text-strip' : ' logo-only') : ''}${pl.logoOnly ? ' logo-only' : ''}" style="--cat-color:${col};${bgColorStyle}${imgStyle}">
          <span class="ad-num">${pl.n}</span>
          ${pl.logoOnly
            ? `<div class="meta" style="position:absolute;bottom:6px;left:8px;right:8px;">${pl.meta || ''}</div>`
            : useStrip
              ? `<div class="text-area"><h3>${pl.name}</h3><div class="sub">${pl.short || ''}</div><div class="meta">${pl.meta || ''}</div></div>`
              : `<h3>${pl.name}</h3><div class="sub">${pl.short || ''}</div><div class="meta">${pl.meta || ''}</div>`
          }
        </div>`;
      }).join('');
      return `<div class="h-rail-head ${cls}">${head}</div>${ads}`;
    }).join('');
    return `<div class="h-rail">${inner}</div>`;
  }

  const leftHtml   = (R.printRails.left  || []).map(renderSection).join('');
  const rightHtml  = (R.printRails.right || []).map(renderSection).join('');
  const topHtml    = renderHRail(R.printRails.top);
  const bottomHtml = renderHRail(R.printRails.bottom);

  const legendHtml = R.legend.map(({ color, label }) =>
    `<div class="item"><span class="dot" style="background:${color}"></span>${label}</div>`
  ).join('');

  /* QR code pointing to the interactive version */
  const qrTarget = encodeURIComponent(`https://leisurelymaps.com/map.html?region=${R.id}`);
  const inkHex = (palette['--ink'] || '#222').replace('#', '');
  const parchHex = (palette['--parch'] || '#f5f0e8').replace('#', '');
  const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${qrTarget}&color=${inkHex}&bgcolor=${parchHex}&qzone=1&format=svg`;

  document.body.innerHTML = `
    <div class="print-bar">
      <a href="index.html">← Gallery</a>
      <button onclick="this.textContent='⏳ Loading…'; setTimeout(() => { this.textContent='🖨 Print'; window.print(); }, 2000)">🖨 Print</button>
    </div>
    <div class="sheet">
      <header class="cartouche">
        <div class="free-badge"><div class="free">FREE</div><div class="take">TAKE ONE</div></div>
        <span class="edition">2026 EDITION</span>
        <div class="title-row"><span class="deco">✦</span><h1>${R.name}</h1><span class="deco">✦</span></div>
        <div class="sub">${R.sub}</div>
      </header>
      ${topHtml}
      <div class="body">
        <aside class="rail">${leftHtml}</aside>
        <div class="map-col">
          <main class="map-area">
            <div id="map"></div>
            <img class="compass-corner" src="assets/compass-rose.svg" alt="" onerror="this.style.display='none'">
          </main>
          <div class="map-below">${renderHRail(R.printRails.mapBelow || [])}</div>
        </div>
        <aside class="rail">${rightHtml}</aside>
      </div>
      ${bottomHtml}
      <div class="bottom-strip">
        <div class="footer-qr">
          <img src="${qrSrc}" alt="QR code">
          <div class="footer-qr-text">
            <div class="footer-qr-title">Interactive Map</div>
            <div class="footer-qr-sub">Scan for turn-by-turn directions in Apple or Google Maps.</div>
          </div>
        </div>
        <div class="footer-legend">${legendHtml}</div>
        <div class="footer-tip">Each number matches a card around the map.<br><strong>↔ 5 min walk</strong> ≈ 1 city block</div>
        <div class="footer-credit">${R.credit}</div>
      </div>
    </div>`;

  /* Locked-down map — no interaction */
  const map = L.map('map', {
    zoomControl: false, dragging: false, touchZoom: false,
    doubleClickZoom: false, scrollWheelZoom: false,
    boxZoom: false, keyboard: false, tap: false, zoomSnap: 0,
  }).setView(R.center, R.printZoom || R.zoom);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: '© OpenStreetMap',
  }).addTo(map);

  R.places.forEach(pl => {
    const col = R.cats[pl.cat] || '#444';
    const html = `<div class="biz-marker" style="--cat-color:${col};border-color:${col}"><div class="num" style="--cat-color:${col}">${pl.n}</div></div>`;
    const icon = L.divIcon({ html, className: '', iconSize: [22, 22], iconAnchor: [11, 11] });
    L.marker([pl.lat, pl.lon], { icon })
      .addTo(map)
      .bindTooltip(`<b>${pl.n}.</b> ${pl.name}`, { className: 'biz-tip' });
  });

})();
</script>
</body>
</html>
