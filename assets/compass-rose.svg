<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="rg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5F0E8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#D8C89A" stop-opacity="0.7"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>

  <!-- Outer decorative ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#1E3C64" stroke-width="1.2" opacity="0.5"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#1E3C64" stroke-width="0.5" opacity="0.3"/>

  <!-- Tick marks around ring -->
  <g stroke="#1E3C64" stroke-width="1" opacity="0.5">
    <!-- 32 tick marks -->
    <line x1="100" y1="12" x2="100" y2="20" transform="rotate(0,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(11.25,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(22.5,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(33.75,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="20" transform="rotate(45,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(56.25,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(67.5,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(78.75,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="20" transform="rotate(90,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(101.25,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(112.5,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(123.75,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="20" transform="rotate(135,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(146.25,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(157.5,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(168.75,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="20" transform="rotate(180,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(191.25,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(202.5,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(213.75,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="20" transform="rotate(225,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(236.25,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(247.5,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(258.75,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="20" transform="rotate(270,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(281.25,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(292.5,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(303.75,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="20" transform="rotate(315,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(326.25,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(337.5,100,100)"/>
    <line x1="100" y1="12" x2="100" y2="18" transform="rotate(348.75,100,100)"/>
  </g>

  <!-- 16-point star background (ordinal points) -->
  <g filter="url(#shadow)">
    <!-- Ordinal points (NE, SE, SW, NW) — smaller, dark -->
    <polygon points="100,26 103,97 100,100 97,97" transform="rotate(45,100,100)" fill="#1E3C64" opacity="0.6"/>
    <polygon points="100,26 103,97 100,100 97,97" transform="rotate(135,100,100)" fill="#1E3C64" opacity="0.6"/>
    <polygon points="100,26 103,97 100,100 97,97" transform="rotate(225,100,100)" fill="#1E3C64" opacity="0.6"/>
    <polygon points="100,26 103,97 100,100 97,97" transform="rotate(315,100,100)" fill="#1E3C64" opacity="0.6"/>

    <!-- Intercardinal points (NNE etc) — smallest -->
    <polygon points="100,38 101.5,98 100,100 98.5,98" transform="rotate(22.5,100,100)" fill="#9AB8D8" opacity="0.8"/>
    <polygon points="100,38 101.5,98 100,100 98.5,98" transform="rotate(67.5,100,100)" fill="#9AB8D8" opacity="0.8"/>
    <polygon points="100,38 101.5,98 100,100 98.5,98" transform="rotate(112.5,100,100)" fill="#9AB8D8" opacity="0.8"/>
    <polygon points="100,38 101.5,98 100,100 98.5,98" transform="rotate(157.5,100,100)" fill="#9AB8D8" opacity="0.8"/>
    <polygon points="100,38 101.5,98 100,100 98.5,98" transform="rotate(202.5,100,100)" fill="#9AB8D8" opacity="0.8"/>
    <polygon points="100,38 101.5,98 100,100 98.5,98" transform="rotate(247.5,100,100)" fill="#9AB8D8" opacity="0.8"/>
    <polygon points="100,38 101.5,98 100,100 98.5,98" transform="rotate(292.5,100,100)" fill="#9AB8D8" opacity="0.8"/>
    <polygon points="100,38 101.5,98 100,100 98.5,98" transform="rotate(337.5,100,100)" fill="#9AB8D8" opacity="0.8"/>

    <!-- Cardinal points (N, E, S, W) — large, alternating dark/light -->
    <!-- North — accent red tip -->
    <polygon points="100,18 104,96 100,100 96,96" fill="#C04830"/>
    <!-- South -->
    <polygon points="100,182 104,104 100,100 96,104" fill="#1E3C64"/>
    <!-- East -->
    <polygon points="182,100 104,104 100,100 104,96" fill="#1E3C64"/>
    <!-- West -->
    <polygon points="18,100 96,104 100,100 96,96" fill="#1E3C64"/>

    <!-- Light facets -->
    <polygon points="100,18 100,100 96,96" fill="#EEF4F8" opacity="0.5"/>
    <polygon points="100,182 100,100 104,104" fill="#EEF4F8" opacity="0.5"/>
    <polygon points="182,100 100,100 104,96" fill="#EEF4F8" opacity="0.5"/>
    <polygon points="18,100 100,100 96,104" fill="#EEF4F8" opacity="0.5"/>
  </g>

  <!-- Center rings -->
  <circle cx="100" cy="100" r="9" fill="#1E3C64" stroke="#EEF4F8" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="4" fill="#C04830"/>

  <!-- Cardinal letters -->
  <text x="100" y="10" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="700" fill="#1E3C64" letter-spacing="1">N</text>
  <text x="100" y="196" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="700" fill="#1E3C64">S</text>
  <text x="193" y="104" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="700" fill="#1E3C64">E</text>
  <text x="7" y="104" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="700" fill="#1E3C64">W</text>
</svg>
